<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Rafaela ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    z-index:10;
}

h1{
    color:white;
    font-size:2.5rem;
    margin-bottom:40px;
    text-shadow:0 0 10px white;
}

.amor{
    color:red;
    font-size:6rem;
    font-weight:bold;

    text-shadow:
    0 0 10px red,
    0 0 20px red,
    0 0 40px red,
    0 0 80px red;

    animation:pulse 2s infinite;
}

p{
    color:white;
    margin-top:20px;
    font-size:1.2rem;
}

#playMusic{
    margin-top:35px;
    padding:15px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }
}
</style>

</head>
<body>

<div class="container">

    <h1>
        Feliz Dia dos Namorados ❤️<br>
        Você é o amor da minha vida
    </h1>

    <div class="amor">
        RAFAELA ❤️
    </div>

    <p>
        Obrigado por existir e fazer meus dias mais felizes ✨
    </p>

    <button id="playMusic">
        🎵 Tocar nossa música
    </button>

</div>

<audio id="musica">
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("playMusic");
const musica = document.getElementById("musica");

btn.addEventListener("click", () => {
    musica.play();
});
</script>

</body>
</html>
